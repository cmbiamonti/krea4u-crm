<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="32" height="32">

  <!--
    K mark geometry (from the logo):
    - Full left vertical bar
    - Chevron (V pointing down) centered above, overlapping the top of the bar
    - Upper-right arm (parallelogram going up-right)
    - Lower-right arm (parallelogram going down-right)
  -->

  <!-- Left vertical bar of K -->
  <rect x="50" y="200" width="70" height="175" fill="#2D4A5C"/>

  <!-- Chevron: downward-pointing V (sits above the bar like a crown) -->
  <polygon points="
    50,200
    85,247
    120,200
    160,200
    85,290
    10,200
  " fill="#2D4A5C"/>

  <!-- Upper right diagonal arm -->
  <polygon points="
    120,200
    120,155
    195,155
    195,200
  " fill="#2D4A5C"/>

  <!-- Lower right diagonal arm -->
  <polygon points="
    120,375
    195,375
    195,330
    120,330
  " fill="#2D4A5C"/>

  <!-- "rea" in dark blue -->
  <text x="218" y="362"
        font-family="'Gill Sans', 'Calibri', 'Trebuchet MS', Arial, sans-serif"
        font-size="145"
        font-weight="300"
        fill="#2D4A5C"
        letter-spacing="0">rea</text>

  <!-- "4" in rust/brown -->
  <text x="385" y="362"
        font-family="'Gill Sans', 'Calibri', 'Trebuchet MS', Arial, sans-serif"
        font-size="145"
        font-weight="600"
        fill="#8B3200"
        letter-spacing="0">4</text>

  <!-- "u" in dark blue -->
  <text x="440" y="362"
        font-family="'Gill Sans', 'Calibri', 'Trebuchet MS', Arial, sans-serif"
        font-size="145"
        font-weight="300"
        fill="#2D4A5C"
        letter-spacing="0">u</text>

</svg>
